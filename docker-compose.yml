services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-funpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-funpay_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-funpay} -d ${POSTGRES_DB:-funpay_bot}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-funpay}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-funpay_bot}
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true
    init: true
    stop_grace_period: 30s

volumes:
  postgres_data:
