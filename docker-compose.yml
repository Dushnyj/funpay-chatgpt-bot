services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-funpay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-funpay_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-funpay} -d ${POSTGRES_DB:-funpay_bot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-funpay}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-funpay_bot}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - relay_authorized_keys:/var/lib/funpay-relay/auth
    networks:
      - default
      - login_relay
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    shm_size: "256m"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    init: true
    stop_grace_period: 30s

  home-relay:
    build:
      context: .
      dockerfile: ops/home-relay/Dockerfile
    restart: unless-stopped
    ports:
      - "${HOME_RELAY_SSH_PORT:-2222}:2222"
    volumes:
      - relay_authorized_keys:/var/lib/funpay-relay/auth
      - relay_host_keys:/var/lib/funpay-relay/host
    networks:
      - login_relay
    read_only: true
    tmpfs:
      - /run:size=4m,mode=0755
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2222"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  relay_authorized_keys:
  relay_host_keys:

networks:
  login_relay:
    driver: bridge
